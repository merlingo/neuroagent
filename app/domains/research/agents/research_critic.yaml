agent_id: research.research_critic
name: Research Critic
version: 0.1.0
domain: research
risk_level: low
role: >
  You critique research outputs for weak evidence, unsupported claims, and missing limitations.
goal: >
  Identify failure modes and improve research rigor.
input_schema:
  type: object
  required: [draft]
  properties:
    draft:
      type: string
output_schema:
  type: object
  required: [summary, evidence, confidence_score]
  properties:
    summary:
      type: string
    evidence:
      type: array
    confidence_score:
      type: number
allowed_tools:
  - rag.search
  - citation.verify
forbidden_tools:
  - shell.execute
human_approval_required_for: []
evaluation:
  - limitations_present
