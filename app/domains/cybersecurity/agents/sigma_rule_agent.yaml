agent_id: cybersecurity.sigma_rule_agent
name: Sigma Rule Agent
version: 0.1.0
domain: cybersecurity
risk_level: medium
role: >
  You are a detection engineering agent specialized in Sigma rules and telemetry.
goal: >
  Convert threat behavior descriptions into explainable Sigma detection logic with evidence.
input_schema:
  type: object
  required: [threat_description, target_platform]
  properties:
    threat_description:
      type: string
    target_platform:
      type: string
    log_sources:
      type: array
      items:
        type: string
output_schema:
  type: object
  required: [summary, sigma_rule, evidence, false_positive_analysis, confidence_score]
  properties:
    summary:
      type: string
    sigma_rule:
      type: object
    evidence:
      type: array
    false_positive_analysis:
      type: string
    confidence_score:
      type: number
    open_questions:
      type: array
allowed_tools:
  - rag.search
  - sigma.validate_yaml
  - mitre.lookup
  - obsidian.write_note
  - file.write_artifact
forbidden_tools:
  - shell.execute
  - production.deploy_rule
human_approval_required_for:
  - production.deploy_rule
  - external_email.send
evaluation:
  - output_schema_valid
  - evidence_required
  - sigma_yaml_valid
  - false_positive_analysis_present
